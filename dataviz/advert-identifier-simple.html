<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Break Identifier — How It Works</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@0.454.0/dist/umd/lucide-react.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .step-enter { opacity: 0; transform: translateY(20px); }
    .step-enter-active { opacity: 1; transform: translateY(0); transition: opacity 0.5s, transform 0.5s; }
    .timeline-dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; left: -6px; top: 4px; }
    @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } 50% { box-shadow: 0 0 0 8px rgba(59,130,246,0); } }
    .pulse { animation: pulse-dot 2s infinite; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createElement: h } = React;
    const { ArrowDown, Sparkles, FileSpreadsheet, Scissors, Eye, Users, CheckCircle, Search, Zap, FolderOpen, Layers, Clock, Film, GitMerge } = LucideReact;

    // Intersection Observer hook
    function useInView(ref) {
      const [inView, setInView] = useState(false);
      useEffect(() => {
        if (!ref.current) return;
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setInView(true); observer.disconnect(); } },
          { threshold: 0.15 }
        );
        observer.observe(ref.current);
        return () => observer.disconnect();
      }, [ref]);
      return inView;
    }

    function StepCard({ icon: Icon, color, bgColor, accentLight, title, children, index, tag }) {
      const ref = useRef(null);
      const inView = useInView(ref);
      return h('div', { ref, className: `transition-all duration-500 ease-out ${inView ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}` },
        h('div', {
          className: `bg-white rounded-2xl shadow-lg border-l-4 ${color} p-6 card-hover`,
          style: { transitionDelay: `${index * 100}ms` }
        },
          h('div', { className: 'flex items-center gap-3 mb-4' },
            h('div', { className: `w-10 h-10 rounded-full ${bgColor} flex items-center justify-center shrink-0` },
              h(Icon, { className: 'w-5 h-5 text-white' })
            ),
            h('div', { className: 'flex-1' },
              h('div', { className: 'flex items-center gap-2' },
                h('p', { className: 'text-xs font-bold text-gray-400 uppercase tracking-wide' }, `Step ${index + 1}`),
                tag && h('span', { className: `text-xs font-semibold px-2 py-0.5 rounded-full ${tag === 'NEW' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}` }, tag)
              ),
              h('h3', { className: 'text-lg font-bold text-gray-800' }, title)
            )
          ),
          children
        )
      );
    }

    function Arrow() {
      return h('div', { className: 'flex justify-center py-2' },
        h(ArrowDown, { className: 'w-6 h-6 text-gray-300' })
      );
    }

    function App() {
      const [mounted, setMounted] = useState(false);
      useEffect(() => { setMounted(true); }, []);

      return h('div', { className: 'min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 p-4 md:p-8' },
        h('div', { className: 'max-w-2xl mx-auto' },

          /* Header */
          h('div', {
            className: `text-center mb-8 transition-all duration-700 ease-out ${mounted ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4'}`
          },
            h('div', { className: 'inline-flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-semibold mb-4' },
              h(Sparkles, { className: 'w-4 h-4' }), 'Ad Break Identifier'
            ),
            h('h1', { className: 'text-2xl md:text-4xl font-extrabold text-gray-900 mb-2' }, 'How It Works'),
            h('p', { className: 'text-gray-500 text-sm max-w-lg mx-auto' },
              'AI that watches TV recordings and identifies every individual advert within an ad break — ',
              'from scheduling data to frame-accurate clip extraction.'
            )
          ),

          /* Big Picture */
          h('div', {
            className: `bg-blue-50 border border-blue-200 rounded-2xl p-5 mb-6 transition-all duration-700 delay-200 ease-out ${mounted ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`
          },
            h('p', { className: 'text-sm font-bold text-blue-800 mb-2' }, 'The Big Picture'),
            h('p', { className: 'text-sm text-blue-700' },
              'TV recordings contain ad breaks with multiple adverts back-to-back. This tool already knows ',
              h('em', null, 'what'), ' adverts should be in each break (from scheduling data), ',
              'uses AI to find ', h('em', null, 'where'), ' each one ends in the video, ',
              'then refines those boundaries to ', h('strong', null, 'millisecond precision'), ' ',
              'and extracts each advert as a separate video file.'
            )
          ),

          /* New: Pipeline diagram overview */
          h('div', {
            className: `bg-white border border-gray-200 rounded-2xl p-5 mb-6 transition-all duration-700 delay-300 ease-out ${mounted ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`
          },
            h('p', { className: 'text-xs font-bold text-gray-400 uppercase tracking-wide mb-3' }, 'The Pipeline at a Glance'),
            h('div', { className: 'flex flex-wrap items-center justify-center gap-1 md:gap-2' },
              ['CSV & Video', 'Clip', '1 FPS AI', '25 FPS Refine', 'Advert Clips'].map((label, i, arr) =>
                h('div', { key: label, className: 'flex items-center gap-1 md:gap-2' },
                  h('div', { className: `text-xs font-semibold px-2.5 py-1.5 rounded-lg whitespace-nowrap ${
                    ['bg-amber-100 text-amber-800', 'bg-rose-100 text-rose-800', 'bg-violet-100 text-violet-800', 'bg-indigo-100 text-indigo-800', 'bg-emerald-100 text-emerald-800'][i]
                  }` }, label),
                  i < arr.length - 1 && h('span', { className: 'text-gray-300 text-xs' }, '→')
                )
              )
            )
          ),

          /* Step 1 — Scheduling */
          Arrow(),
          h(StepCard, { icon: FileSpreadsheet, color: 'border-amber-500', bgColor: 'bg-amber-500', title: 'Read the Schedule', index: 0 },
            h('p', { className: 'text-gray-600 text-sm mb-4' },
              'The BFI National Archive obtains scheduling data as CSV files. These contain what was broadcast and approximately when — including every advert, its brand, duration, and timecode. The tool reads these files and matches them to the video recording.'
            ),
            h('div', { className: 'bg-amber-50 rounded-xl p-4' },
              h('div', { className: 'flex items-center gap-3 mb-3' },
                h('span', { className: 'text-2xl' }, '📋'),
                h('div', null,
                  h('p', { className: 'text-sm font-semibold text-amber-800' }, 'CSV Scheduling Data'),
                  h('p', { className: 'text-xs text-amber-600' }, 'e.g. 2024-03-26_BFIExport.csv')
                )
              ),
              h('div', { className: 'bg-white rounded-lg p-3 text-xs font-mono text-gray-600 space-y-1' },
                h('p', null, '13:52:05 — Tesco (10s)'),
                h('p', null, '13:52:15 — Sky Mobile (30s)'),
                h('p', null, '13:52:45 — Cadbury (20s)'),
                h('p', { className: 'text-gray-400' }, '...and so on')
              ),
              h('p', { className: 'text-xs text-amber-600 mt-2' }, 'The tool also creates a pipeline state file that tracks every advert through all subsequent stages.')
            )
          ),

          /* Step 2 — Clip extraction */
          Arrow(),
          h(StepCard, { icon: Scissors, color: 'border-rose-500', bgColor: 'bg-rose-500', title: 'Cut Out the Ad Breaks', index: 1 },
            h('p', { className: 'text-gray-600 text-sm mb-4' },
              'Rather than processing an entire hours-long recording, the tool cuts out just the ad break sections using FFmpeg. It knows from the schedule roughly when each ad break starts, so it extracts a short clip with configurable buffer — typically 60 seconds before and 360 seconds after.'
            ),
            h('div', { className: 'bg-rose-50 rounded-xl p-4' },
              h('div', { className: 'flex items-end gap-0.5 mb-3' },
                [...Array(20)].map((_, i) => {
                  const isAdBreak = i >= 6 && i <= 13;
                  return h('div', { key: i, className: 'flex-1 flex flex-col items-center gap-0.5' },
                    h('div', { className: `w-full rounded-sm ${isAdBreak ? 'bg-rose-400 h-8' : 'bg-gray-300 h-5'}`, })
                  );
                })
              ),
              h('div', { className: 'flex items-center gap-2 text-xs' },
                h('div', { className: 'flex items-center gap-1' }, h('div', { className: 'w-3 h-3 bg-gray-300 rounded-sm' }), h('span', { className: 'text-gray-500' }, 'Programme')),
                h('div', { className: 'flex items-center gap-1' }, h('div', { className: 'w-3 h-3 bg-rose-400 rounded-sm' }), h('span', { className: 'text-rose-600' }, 'Ad break'))
              )
            )
          ),

          /* Step 3 — AI watches */
          Arrow(),
          h(StepCard, { icon: Eye, color: 'border-violet-500', bgColor: 'bg-violet-500', title: 'AI "Watches" at 1 FPS', index: 2 },
            h('p', { className: 'text-gray-600 text-sm mb-4' },
              'The AI watches each ad break clip at 1 frame per second and identifies the last frame of every expected advert. It already knows from the schedule what brands and durations to look for — its job is to confirm when each one ends by spotting logos or brand names in the final seconds.'
            ),
            h('div', { className: 'bg-violet-50 rounded-xl p-4' },
              h('div', { className: 'space-y-2 mb-3' },
                [{ brand: 'Tesco', time: '13:52:15', status: '✓ Found' }, { brand: 'Sky Mobile', time: '13:52:45', status: '✓ Found' }, { brand: 'Cadbury', time: '13:53:05', status: '✓ Found' }]
                  .map((ad, i) =>
                    h('div', { key: i, className: 'flex items-center gap-3 bg-white rounded-lg px-3 py-2' },
                      h('div', { className: 'w-6 h-6 bg-emerald-100 rounded-full flex items-center justify-center text-xs' }, '✓'),
                      h('div', { className: 'flex-1' },
                        h('p', { className: 'text-xs font-bold text-gray-800' }, ad.brand),
                        h('p', { className: 'text-xs text-gray-400' }, 'Last frame at ', ad.time)
                      ),
                      h('span', { className: 'text-xs font-semibold text-emerald-600' }, ad.status)
                    )
                  )
              ),
              h('div', { className: 'flex items-center gap-2 bg-indigo-50 rounded-lg p-3' },
                h(Users, { className: 'w-4 h-4 text-indigo-500 shrink-0' }),
                h('p', { className: 'text-xs text-indigo-700' },
                  h('strong', null, 'Ensemble voting: '),
                  'The AI watches ', h('strong', null, '5 times'), ' independently and picks the median result, filtering out any wild outliers.'
                )
              )
            )
          ),

          /* Step 4 — Refinement NEW */
          Arrow(),
          h(StepCard, { icon: Search, color: 'border-indigo-500', bgColor: 'bg-indigo-500', title: 'Millisecond Precision (25 FPS)', index: 3, tag: 'NEW' },
            h('p', { className: 'text-gray-600 text-sm mb-4' },
              'The 1 FPS detection gets you within one second — but broadcast video runs at 25 frames per second. The refinement stage zooms in: for each advert, it extracts a 3-second clip centred on the expected end time, then analyses it at full 25 FPS to find the precise millisecond when the brand logo disappears.'
            ),
            h('div', { className: 'grid grid-cols-2 gap-3 mb-3' },
              h('div', { className: 'bg-indigo-50 rounded-xl p-3' },
                h('p', { className: 'text-xs font-semibold text-indigo-700 mb-1' }, '🎯 How It Works'),
                h('ul', { className: 'text-xs text-indigo-600 space-y-1 ml-3 list-disc' },
                  h('li', null, '3-second clip per advert'),
                  h('li', null, 'Analysed at 25 FPS (75 frames)'),
                  h('li', null, '3 ensemble calls for accuracy'),
                  h('li', null, 'Median voting per frame')
                )
              ),
              h('div', { className: 'bg-indigo-50 rounded-xl p-3' },
                h('p', { className: 'text-xs font-semibold text-indigo-700 mb-1' }, '⚡ Configurable FPS'),
                h('ul', { className: 'text-xs text-indigo-600 space-y-1 ml-3 list-disc' },
                  h('li', null, '25 FPS default (PAL)'),
                  h('li', null, '24 FPS for NTSC sources'),
                  h('li', null, 'MAD outlier filter available'),
                  h('li', null, 'HH:MM:SS.mmm output')
                )
              )
            ),
            h('div', { className: 'bg-gray-900 rounded-xl p-3 font-mono text-xs' },
              h('p', { className: 'text-gray-400' }, 'Coarse (1 FPS):  ', h('span', { className: 'text-amber-400 font-bold' }, '13:52:15')),
              h('p', { className: 'text-gray-400' }, 'Refined (25 FPS): ', h('span', { className: 'text-emerald-400 font-bold' }, '13:52:15.080')),
              h('p', { className: 'text-gray-500 mt-1' }, '↑ Frame-accurate to ±40ms')
            )
          ),

          /* Step 5 — Individual advert clips NEW */
          Arrow(),
          h(StepCard, { icon: Film, color: 'border-emerald-500', bgColor: 'bg-emerald-500', title: 'Extract Individual Adverts', index: 4, tag: 'NEW' },
            h('p', { className: 'text-gray-600 text-sm mb-4' },
              'Using the refined frame-accurate timecodes, the tool extracts each advert as its own lossless H.264 video clip. Every clip is named with the advert\'s brand, category, and unique ID — ready for cataloguing, review, or access.'
            ),
            h('div', { className: 'bg-emerald-50 rounded-xl p-4' },
              h('p', { className: 'text-xs font-semibold text-emerald-700 mb-2' }, 'Sample Output'),
              h('div', { className: 'bg-white rounded-lg p-3 font-mono text-xs space-y-1' },
                h('p', { className: 'text-gray-600' }, 'clips/', h('span', { className: 'text-emerald-700 font-semibold' }, 'BBHTCPT536010'), '_retail_Tesco.mp4'),
                h('p', { className: 'text-gray-600' }, 'clips/', h('span', { className: 'text-emerald-700 font-semibold' }, 'SKYMO2394030'), '_telecoms_Sky Mobile.mp4'),
                h('p', { className: 'text-gray-600' }, 'clips/', h('span', { className: 'text-emerald-700 font-semibold' }, 'CADBURY2030'), '_food_Cadbury.mp4')
              ),
              h('div', { className: 'flex items-center gap-2 mt-2 text-xs text-emerald-600' },
                h(Zap, { className: 'w-3 h-3' }),
                h('span', null, 'Lossless extraction — no re-encoding, no quality loss')
              )
            )
          ),

          /* Pipeline state callout */
          Arrow(),
          h(StepCard, { icon: GitMerge, color: 'border-teal-500', bgColor: 'bg-teal-500', title: 'Tracking Every Advert Through the Pipeline', index: 5, tag: 'LATEST' },
            h('p', { className: 'text-gray-600 text-sm mb-4' },
              'A single "pipeline state file" follows each advert through every stage. It starts empty at Step 1, gets updated at each stage — from "metadata extracted" through "identified" to "refined" — and finally contains the complete frame-accurate broadcast timecodes needed for clip extraction.'
            ),
            h('div', { className: 'bg-teal-50 rounded-xl p-4' },
              h('div', { className: 'flex flex-wrap items-center justify-center gap-2 text-xs' },
                ['Extracted', 'Clipped', 'Identified', 'Refined', 'Clipped'].map((s, i, arr) =>
                  h('div', { key: s, className: 'flex items-center gap-2' },
                    h('span', { className: 'bg-teal-600 text-white px-2.5 py-1 rounded-full font-semibold whitespace-nowrap' }, '✓ ', s),
                    i < arr.length - 1 && h('span', { className: 'text-gray-300' }, '→')
                  )
                )
              ),
              h('p', { className: 'text-xs text-teal-600 mt-2 text-center' }, 'The state file bridges clip-relative timecodes to broadcast-absolute offsets.')
            )
          ),

          /* Full automation */
          h('div', {
            className: `bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-5 mt-6 text-white transition-all duration-700 delay-500 ease-out ${mounted ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`
          },
            h('div', { className: 'flex items-center gap-2 mb-2' },
              h(FolderOpen, { className: 'w-5 h-5' }),
              h('p', { className: 'font-bold text-sm' }, 'Full Automation Available')
            ),
            h('p', { className: 'text-sm text-blue-100 mb-3' },
              'Point the tool at an entire folder of recordings and it will process them all automatically — extracting metadata, cutting clips, running 1 FPS and 25 FPS analysis, and extracting every advert clip. One command does everything.'
            ),
            h('div', { className: 'bg-blue-800/50 rounded-xl p-3 font-mono text-xs text-blue-200' },
              'advert-identifier-pipeline \\', h('br'),
              '  --input-folder /path/to/videos \\', h('br'),
              '  --csv-folder /path/to/csv/files'
            )
          ),

          /* Footer */
          h('div', {
            className: `text-center mt-8 mb-4 transition-all duration-700 delay-700 ease-out ${mounted ? 'opacity-100' : 'opacity-0'}`
          },
            h('p', { className: 'text-xs text-gray-400' }, 'Powered by Qwen3.5 Vision-Language Model · FFmpeg · vLLM · Built at the BFI National Archive'),
            h('p', { className: 'text-xs text-gray-300 mt-1' }, 'v2 — Updated for full pipeline: 1 FPS detection → 25 FPS refinement → individual advert clips')
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
