<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Break Identifier — Technical Architecture</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@0.454.0/dist/umd/lucide-react.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    .tab-btn { transition: all 0.15s ease; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-1px); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.3s ease forwards; }
    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 0 6px rgba(99,102,241,0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, createElement: h } = React;
    const { 
      Cpu, Layers, Terminal, FileSpreadsheet, Scissors, Eye, 
      Search, ArrowRight, ArrowDown, CheckCircle, FolderOpen,
      Cog, GitMerge, Clock, Tv, Database, Filter, Play,
      Sliders, Shield, Settings, Workflow, FileOutput
    } = LucideReact;

    const TABS = [
      { id: 'overview', label: 'Pipeline', icon: Layers },
      { id: 'metadata', label: 'Stage 1: Metadata', icon: FileSpreadsheet },
      { id: 'clip', label: 'Stage 2: Clip Extraction', icon: Scissors },
      { id: 'detect', label: 'Stage 3: AI Detection', icon: Eye },
      { id: 'refine', label: 'Stage 4: Refinement', icon: Search },
      { id: 'extract', label: 'Stage 5: Advert Clips', icon: FileOutput },
      { id: 'automation', label: 'Automation', icon: FolderOpen },
    ];

    function SectionHeader({ icon: Icon, title, color }) {
      return h('div', { className: `flex items-center gap-2 mb-3 pb-2 border-b ${color}` },
        h(Icon, { className: 'w-4 h-4' }),
        h('h3', { className: 'font-bold text-sm' }, title)
      );
    }

    function PipelineNode({ label, sublabel, color, icon: Icon, border }) {
      return h('div', { className: `rounded-lg ${color} ${border || ''} p-2 text-center min-w-max` },
        Icon && h(Icon, { className: 'w-3.5 h-3.5 mx-auto mb-0.5' }),
        h('p', { className: 'text-xs font-bold' }, label),
        sublabel && h('p', { className: 'text-xs opacity-70 leading-tight' }, sublabel)
      );
    }

    function PipeArrow({ label }) {
      return h('div', { className: 'flex flex-col items-center justify-center px-0.5 shrink-0' },
        h(ArrowRight, { className: 'w-3.5 h-3.5 text-gray-500' }),
        label && h('span', { className: 'text-xs text-gray-500' }, label)
      );
    }

    function DownArrow({ label }) {
      return h('div', { className: 'flex flex-col items-center py-1' },
        h(ArrowDown, { className: 'w-4 h-4 text-gray-500' }),
        label && h('span', { className: 'text-xs text-gray-500' }, label)
      );
    }

    function ParamRow({ name, value, note }) {
      return h('div', { className: 'flex items-baseline gap-2 py-1.5 border-b border-gray-800' },
        h('code', { className: 'mono text-xs bg-gray-800 px-1.5 py-0.5 rounded text-gray-400 shrink-0' }, name),
        h('span', { className: 'text-xs font-semibold text-gray-200' }, value),
        note && h('span', { className: 'text-xs text-gray-500 ml-auto' }, note)
      );
    }

    function CodeBlock({ children, language }) {
      return h('pre', { className: `bg-gray-950 rounded-lg p-3 ${language === 'json' ? 'text-xs text-gray-300' : 'mono text-xs text-green-400'} overflow-x-auto` },
        children
      );
    }

    function Tag({ children, color }) {
      const colors = {
        new: 'bg-emerald-900 text-emerald-200 border border-emerald-700',
        update: 'bg-amber-900 text-amber-200 border border-amber-700',
        stable: 'bg-gray-700 text-gray-300',
      };
      return h('span', { className: `${colors[color] || colors.new} text-xs font-bold px-1.5 py-0.5 rounded` }, children);
    }

    function App() {
      const [activeTab, setActiveTab] = useState('overview');

      const renderTab = (tabId) => {
        const ani = { className: 'animate-in' };

        switch(tabId) {
          case 'overview': return h('div', { key: 'overview', ...ani },
            /* Pipeline Overview */
            h('div', { className: 'bg-gray-900 border border-gray-800 rounded-2xl p-5 mb-4' },
              h(SectionHeader, { icon: Layers, title: 'End-to-End Pipeline', color: 'border-blue-800 text-blue-400' }),
              h('p', { className: 'text-xs text-gray-400 mb-4' },
                'Five discrete stages, each with its own CLI command. Stages produce artifacts consumed by the next. ',
                h(Tag, { color: 'new' }, 'NEW'), ' Stages 4 and 5 added since initial release.'
              ),

              /* 5-Stage Pipeline Flow */
              h('div', { className: 'space-y-2' },
                /* Stage 1 */
                h('div', { className: 'bg-amber-950 border border-amber-800 rounded-xl p-3 card-hover' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-amber-700 text-amber-100 text-xs font-bold px-2 py-0.5 rounded' }, '1'),
                    h('p', { className: 'text-xs font-bold text-amber-400' }, 'Metadata Extraction'),
                    h('code', { className: 'mono text-xs text-amber-600 ml-auto' }, 'advert-identifier-metadata-extract')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'Video filename'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'CSV lookup'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'Filter & group'),
                    h(PipeArrow),
                    h('span', { className: 'bg-amber-800 px-2 py-1 rounded text-amber-200 font-bold' }, '_metadata.json'),
                    h('span', { className: 'text-gray-600 px-1' }, '+'),
                    h('span', { className: 'bg-blue-800 px-2 py-1 rounded text-blue-200 font-bold' }, '_pipeline_state.json')
                  )
                ),
                h(DownArrow, { label: 'JSON metadata + state file' }),
                /* Stage 2 */
                h('div', { className: 'bg-rose-950 border border-rose-800 rounded-xl p-3 card-hover' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-rose-700 text-rose-100 text-xs font-bold px-2 py-0.5 rounded' }, '2'),
                    h('p', { className: 'text-xs font-bold text-rose-400' }, 'Clip Extraction'),
                    h('code', { className: 'mono text-xs text-rose-600 ml-auto' }, 'advert-identifier-clip')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, '_metadata.json'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'FFmpeg seek'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, '-60s / +360s window'),
                    h(PipeArrow),
                    h('span', { className: 'bg-rose-800 px-2 py-1 rounded text-rose-200 font-bold' }, '_CLIP.mp4 per break')
                  )
                ),
                h(DownArrow, { label: 'video clips' }),
                /* Stage 3 */
                h('div', { className: 'bg-violet-950 border border-violet-800 rounded-xl p-3 card-hover' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-violet-700 text-violet-100 text-xs font-bold px-2 py-0.5 rounded' }, '3'),
                    h('p', { className: 'text-xs font-bold text-violet-400' }, 'AI Identification', h('span', { className: 'ml-1.5 text-gray-500 font-normal' }, '(1 FPS)')),
                    h('code', { className: 'mono text-xs text-violet-600 ml-auto' }, 'advert-identifier')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'Clip + metadata'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'VLM analysis'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'Ensemble (5×) + vote'),
                    h(PipeArrow),
                    h('span', { className: 'bg-violet-800 px-2 py-1 rounded text-violet-200 font-bold' }, '_CLIP.xml + state update')
                  )
                ),
                h(DownArrow, { label: 'XML results + coarse_1fps state' }),
                /* Stage 4 - NEW */
                h('div', { className: 'bg-indigo-950 border border-indigo-700 rounded-xl p-3 card-hover ring-1 ring-indigo-500/30' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-indigo-700 text-indigo-100 text-xs font-bold px-2 py-0.5 rounded' }, '4'),
                    h('p', { className: 'text-xs font-bold text-indigo-400' }, 'Frame Refinement', h('span', { className: 'ml-1.5 text-gray-500 font-normal' }, '(25 FPS)')),
                    h(Tag, { color: 'new' }, 'NEW'),
                    h('code', { className: 'mono text-xs text-indigo-600 ml-auto' }, 'advert-identifier-refine')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'XML + clip URL'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, '3s clip @ 25 FPS'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'Ensemble (3×) + MAD filter'),
                    h(PipeArrow),
                    h('span', { className: 'bg-indigo-800 px-2 py-1 rounded text-indigo-200 font-bold' }, '_refined.xml + state update')
                  )
                ),
                h(DownArrow, { label: 'Refined XML + adjusted_start_broadcast' }),
                /* Stage 5 - NEW */
                h('div', { className: 'bg-emerald-950 border border-emerald-700 rounded-xl p-3 card-hover ring-1 ring-emerald-500/30' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-emerald-700 text-emerald-100 text-xs font-bold px-2 py-0.5 rounded' }, '5'),
                    h('p', { className: 'text-xs font-bold text-emerald-400' }, 'Advert Clip Extraction'),
                    h(Tag, { color: 'new' }, 'NEW'),
                    h('code', { className: 'mono text-xs text-emerald-600 ml-auto' }, 'advert-identifier-single-advert-clip')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'Refined XML'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'State file seek offset'),
                    h(PipeArrow),
                    h('span', { className: 'bg-gray-800 px-2 py-1 rounded text-gray-300' }, 'FFmpeg lossless cut'),
                    h(PipeArrow),
                    h('span', { className: 'bg-emerald-800 px-2 py-1 rounded text-emerald-200 font-bold' }, 'Individual .mp4 per advert')
                  )
                )
              ),

              /* File naming */
              h('div', { className: 'mt-4 bg-gray-800 rounded-xl p-3' },
                h('p', { className: 'text-xs font-bold text-gray-300 mb-2' }, 'File Naming Convention'),
                h('div', { className: 'space-y-1 mono text-xs' },
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-gray-400' }, 'Video:'), h('span', { className: 'text-blue-400' }, 'YYYY-MM-DD_CHANNEL_HH:MM:SS.mp4')),
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-gray-400' }, 'CSV:'), h('span', { className: 'text-amber-400' }, 'YYYY-MM-DD_BFIExport.csv')),
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-gray-400' }, 'State:'), h('span', { className: 'text-blue-400' }, '{video}_pipeline_state.json')),
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-gray-400' }, 'Clip:'), h('span', { className: 'text-rose-400' }, '{video}_{index}of{total}_CLIP.mp4')),
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-gray-400' }, 'Advert:'), h('span', { className: 'text-emerald-400' }, '{unique_id}_{category}_{brand}.mp4'))
                )
              )
            ),

            /* CLI commands card */
            h('div', { className: 'bg-gray-900 border border-gray-800 rounded-2xl p-5' },
              h(SectionHeader, { icon: Terminal, title: 'CLI Commands', color: 'border-gray-700 text-gray-300' }),
              h('div', { className: 'space-y-2' },
                h(CommandCard, { name: 'advert-identifier', desc: 'Core 1 FPS detection with ensemble voting', args: ['--mode timecode|frame', '--ad-break-index N', '--no-ensemble', '--no-thinking', '--verbose', '--debug', '--model NAME'], color: 'border-violet-500' }),
                h(CommandCard, { name: 'advert-identifier-refine', desc: '25 FPS frame-accurate boundary refinement', args: ['--xml-file', '--video-url', '--json-file', '--refine-fps 25', '--ensemble-filter mad', '--no-thinking'], color: 'border-indigo-500', tag: 'NEW' }),
                h(CommandCard, { name: 'advert-identifier-pipeline', desc: 'Full automation: processes entire folders end-to-end', args: ['--input-folder', '--csv-folder', '--video-server-url', '--dry-run', '--log-level'], color: 'border-blue-500' }),
                h(CommandCard, { name: 'advert-identifier-metadata-extract', desc: 'Parses video filenames → matches CSV → produces metadata + state JSON', args: ['--video', '--csv-folder', '--output-dir', '--before-secs'], color: 'border-amber-500' }),
                h(CommandCard, { name: 'advert-identifier-clip', desc: 'FFmpeg clip extraction centered on ad break timestamps', args: ['--json-file', '--before-secs 60', '--after-secs 360', '--overlay-type'], color: 'border-rose-500' }),
                h(CommandCard, { name: 'advert-identifier-single-advert-clip', desc: 'Lossless individual advert clip extraction', args: ['--xml-file', '--video-url', '--state-file', '--output-dir', '--trim', '--pad'], color: 'border-emerald-500', tag: 'NEW' }),
                h(CommandCard, { name: 'advert-identifier-benchmark', desc: 'Accuracy testing against ground truth', args: ['--ground-truth-first', '-n 10'], color: 'border-gray-500' }),
              )
            )
          );

          case 'metadata': return h('div', { key: 'metadata', ...ani },
            h('div', { className: 'bg-gray-900 border border-gray-800 rounded-2xl p-5' },
              h(SectionHeader, { icon: FileSpreadsheet, title: 'Stage 1 — Metadata Extraction', color: 'border-amber-800 text-amber-400' }),
              h('p', { className: 'text-xs text-gray-400 mb-4' },
                'Parses the video filename to extract date and channel, locates the corresponding CSV scheduling file, and filters it to the relevant broadcast window. Outputs structured JSON with ad break timestamps plus a ',
                h('code', { className: 'mono bg-gray-800 px-1 rounded text-xs' }, '_pipeline_state.json'),
                ' for advert tracking across all stages.'
              ),
              h('div', { className: 'bg-gray-800 rounded-xl p-4 mb-3' },
                h('p', { className: 'text-xs font-bold text-amber-400 mb-2' }, 'Processing Flow'),
                h('div', { className: 'flex items-center gap-1 overflow-x-auto pb-1' },
                  h(PipelineNode, { label: 'Video filename', sublabel: 'date + channel + time', color: 'bg-gray-700 text-gray-300', icon: Tv }),
                  h(PipeArrow),
                  h(PipelineNode, { label: 'Locate CSV', sublabel: 'YYYY-MM-DD_BFIExport.csv', color: 'bg-gray-700 text-gray-300', icon: Search }),
                  h(PipeArrow),
                  h(PipelineNode, { label: 'Filter by channel', sublabel: '+ time window', color: 'bg-amber-900 text-amber-200', border: 'border border-amber-700', icon: Filter }),
                  h(PipeArrow),
                  h(PipelineNode, { label: 'Group ad breaks', sublabel: 'consecutive ads', color: 'bg-amber-900 text-amber-200', icon: Database }),
                  h(PipeArrow),
                  h(PipelineNode, { label: '_metadata.json', color: 'bg-amber-800 text-amber-100', icon: CheckCircle }),
                  h('span', { className: 'text-gray-600 px-1 text-xs' }, '+'),
                  h(PipelineNode, { label: '_pipeline_state.json', sublabel: 'per-advert tracking', color: 'bg-blue-800 text-blue-100', icon: GitMerge })
                )
              ),
              h('div', { className: 'bg-gray-800 rounded-xl p-3 mb-3' },
                h('p', { className: 'text-xs font-bold text-gray-300 mb-2' }, 'Pipeline State File ', h(Tag, { color: 'update' }, 'UPDATED')),
                h('p', { className: 'text-xs text-gray-400 mb-2' },
                  'The state file is ', h('strong', { className: 'text-gray-200' }, 'the system of record'), ' for advert progression through all stages. ',
                  'Created here, updated by each subsequent stage.'
                ),
                h('div', { className: 'flex items-center gap-2 text-xs text-gray-400 mb-2' },
                  h(ArrowRight, { className: 'w-3 h-3' }),
                  h('span', null, 'State machine: '),
                  ['Extracted', 'Clipped', 'Identified', 'Refined', 'Clipped'].map((s, i, arr) =>
                    h('span', { key: s, className: 'flex items-center gap-1' },
                      h('span', { className: 'text-gray-500' }, s),
                      i < arr.length - 1 && h('span', { className: 'text-gray-600' }, '→')
                    )
                  )
                )
              ),
              h('div', { className: 'bg-gray-800 rounded-xl p-3 mb-3' },
                h('p', { className: 'text-xs font-bold text-gray-300 mb-2' }, 'Output Structure (per ad break)'),
                h(CodeBlock, { language: 'json' },
`{
  "ad_breaks": [{
    "index": 0,
    "programme_before": {"title": "ITV LUNCHTIME NEWS"},
    "programme_after": {"title": "ITV LUNCHTIME NEWS"},
    "start_time": "13:52:05",
    "end_time": "13:55:35",
    "adverts": [{
      "unique_id": "BBHTCPT536010",
      "advertiser": "Tesco stores",
      "brand": "Tesco easter",
      "category": "Food & drink",
      "duration_seconds": 10,
      "start_time": "13:52:05",
      "position_in_break": "First"
    }]
  }],
  "summary": {
    "total_ad_breaks": 1,
    "total_adverts": 7
  }
}`
                )
              ),
              h('div', { className: 'bg-gray-800 rounded-xl p-3' },
                h('p', { className: 'text-xs font-bold text-gray-300 mb-2' }, 'Key Parameters'),
                h(ParamRow, { name: '--video', value: 'path/to/video.mp4', note: 'filename parsed for date/channel' }),
                h(ParamRow, { name: '--csv-folder', value: 'path/to/csv/', note: 'defaults to video directory' }),
                h(ParamRow, { name: '--output-dir', value: 'path/to/output/', note: 'where JSON + state files are written' }),
                h(ParamRow, { name: '--before-secs', value: '10.0', note: 'affects clip_offset in pipeline state' })
              )
            )
          );

          case 'clip': return h('div', { key: 'clip', ...ani },
            h('div', { className: 'bg-gray-900 border border-gray-800 rounded-2xl p-5' },
              h(SectionHeader, { icon: Scissors, title: 'Stage 2 — Clip Extraction', color: 'border-rose-800 text-rose-400' }),
              h('p', { className: 'text-xs text-gray-400 mb-4' },
                'Reads the metadata JSON, iterates over each ad break, and uses FFmpeg to extract a clip centered on the ad break\'s start timecode. The extraction window is configurable. Supports optional burnt-in timecode or frame overlays.'
              ),
              h('div', { className: 'bg-gray-800 rounded-xl p-4 mb-3' },
                h('p', { className: 'text-xs font-bold text-rose-400 mb-2' }, 'Extraction Window'),
                h('div', { className: 'relative bg-gray-700 rounded-lg p-4' },
                  h('div', { className: 'flex items-end gap-px h-16' },
                    [...Array(30)].map((_, i) => {
                      const isBefore = i >= 3 && i < 6;
                      const isAdBreak = i >= 6 && i <= 24;
                      const isAfter = i > 24 && i <= 27;
                      let bg = 'bg-gray-600', hgt = 'h-6';
                      if (isAdBreak) { bg = 'bg-rose-500'; hgt = 'h-12'; }
                      else if (isBefore || isAfter) { bg = 'bg-rose-300'; hgt = 'h-8'; }
                      return h('div', { key: i, className: `flex-1 ${bg} ${hgt} rounded-sm` });
                    })
                  ),
                  h('div', { className: 'flex items-center gap-2 mt-2 text-xs' },
                    h('div', { className: 'flex items-center gap-1' }, h('div', { className: 'w-2.5 h-2.5 bg-gray-600 rounded-sm' }), h('span', { className: 'text-gray-400' }, 'Programme')),
                    h('div', { className: 'flex items-center gap-1' }, h('div', { className: 'w-2.5 h-2.5 bg-rose-300 rounded-sm' }), h('span', { className: 'text-rose-300' }, 'Buffer')),
                    h('div', { className: 'flex items-center gap-1' }, h('div', { className: 'w-2.5 h-2.5 bg-rose-500 rounded-sm' }), h('span', { className: 'text-rose-400' }, 'Ad break'))
                  )
                )
              ),
              h('div', { className: 'bg-gray-800 rounded-xl p-4 mb-3' },
                h('p', { className: 'text-xs font-bold text-rose-400 mb-2' }, 'FFmpeg Command'),
                h(CodeBlock, {},
`ffmpeg -ss <start - before_secs> \\
  -i source_video.mp4 \\
  -t <before_secs + after_secs> \\
  -c copy \\
  output_CLIP.mp4`
                ),
                h('p', { className: 'text-xs text-gray-500 mt-2' },
                  'Uses stream copy (', h('code', { className: 'mono bg-gray-700 px-1 rounded' }, '-c copy'), ') for fast lossless extraction.'
                )
              ),
              h('div', { className: 'bg-gray-800 rounded-xl p-3' },
                h('p', { className: 'text-xs font-bold text-gray-300 mb-2' }, 'Overlay Options'),
                h('div', { className: 'grid grid-cols-3 gap-2 mb-3' },

                  h('strong', { className: 'text-gray-300' }, 'adusted_start_broadcast'), ' is the final FFmpeg seek offset for clip extraction. ',
                  'Computed as: ', h('code', { className: 'mono bg-gray-700 px-1 rounded text-gray-400' }, 'last_seconds_broadcast - scheduled_duration_seconds')
                )
              ),
              /* Coordinate systems */
              h('div', { className: 'bg-gray-800 rounded-xl p-3' },
                h('p', { className: 'text-xs font-bold text-gray-300 mb-2' }, 'Coordinate Systems'),
                h('p', { className: 'text-xs text-gray-400 mb-2' }, 'The pipeline operates in three coordinate frames:'),
                h('div', { className: 'overflow-x-auto' },
                  h('table', { className: 'w-full text-xs text-left' },
                    h('thead', null,
                      h('tr', { className: 'border-b border-gray-700' },
                        h('th', { className: 'py-1 text-gray-400 font-semibold pr-3' }, 'Frame'),
                        h('th', { className: 'py-1 text-gray-400 font-semibold pr-3' }, 'Origin'),
                        h('th', { className: 'py-1 text-gray-400 font-semibold' }, 'Used by'))
                    ),
                    h('tbody', { className: 'text-gray-300' },
                      [['Broadcast-absolute', 'Start of full broadcast .mp4', 'FFmpeg -ss seeks'],
                       ['Clip-relative', 'Start of 6-minute extracted clip', '1 FPS LLM, 25 FPS refinement'],
                       ['Time-of-day', 'Wall clock HH:MM:SS', 'CSV metadata'],
                      ].map(([a, b, c], i) =>
                        h('tr', { key: i, className: 'border-b border-gray-800' },
                          h('td', { className: 'py-1 text-gray-400 font-semibold pr-3' }, a),
                          h('td', { className: 'py-1 text-gray-300 pr-3' }, b),
                          h('td', { className: 'py-1 text-gray-400' }, c))
                      ))
                  )
                ),
                h('p', { className: 'text-xs text-gray-500 mt-2' },
                  'Bridged by ', h('code', { className: 'mono bg-gray-700 px-1 rounded' }, 'clip_offset = (break_start_tod - video_start_tod) - before_secs'),
                  '. See ', h('a', { href: '../docs/coordinate-systems.md', className: 'text-blue-400 hover:underline' }, 'docs/coordinate-systems.md'),
                  '.'
                )
              )
            ),
            /* Requirements */
            h('div', { className: 'bg-gray-900 border border-gray-800 rounded-2xl p-5 mt-4' },
              h(SectionHeader, { icon: Settings, title: 'Requirements', color: 'border-gray-700 text-gray-300' }),
              h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-3' },
                h('div', { className: 'bg-gray-800 rounded-xl p-3' },
                  h('p', { className: 'text-xs font-bold text-gray-300 mb-2' }, 'Runtime'),
                  h(ParamRow, { name: 'Python', value: '3.10+' }),
                  h(ParamRow, { name: 'FFmpeg', value: 'installed in PATH' }),
                  h(ParamRow, { name: 'vLLM', value: 'server with VLM loaded' }),
                  h(ParamRow, { name: 'Model', value: 'Qwen3.5-4B recommended' })
                ),
                h('div', { className: 'bg-gray-800 rounded-xl p-3' },
                  h('p', { className: 'text-xs font-bold text-gray-300 mb-2' }, 'Model Options'),
                  h('div', { className: 'space-y-1.5' },
                    h('div', { className: 'flex items-center gap-2' }, h('span', { className: 'text-xs font-bold text-blue-400' }, 'Qwen3.5-4B'), h('span', { className: 'text-xs text-gray-500' }, '— 60s video, ~70% VRAM, fast')),
                    h('div', { className: 'flex items-center gap-2' }, h('span', { className: 'text-xs font-bold text-purple-400' }, 'Qwen3.5-9B'), h('span', { className: 'text-xs text-gray-500' }, '— medium video, ~90% VRAM')),
                    h('div', { className: 'flex items-center gap-2' }, h('span', { className: 'text-xs font-bold text-amber-400' }, 'Qwen3.5-27B-FP8'), h('span', { className: 'text-xs text-gray-500' }, '— text-only, ~50% VRAM, very fast'))
                  )
                )
              )
            ),
            /* Footer */
            h('p', { className: 'text-center text-xs text-gray-600 mt-6 mb-4' },
              'Qwen3.5 · FFmpeg · vLLM Serve API · Built at BFI National Archive',
              h('br'),
              h('span', { className: 'text-gray-700' }, 'v2 — Updated with Stages 4 & 5: 25 FPS refinement + advert clip extraction')
            )
          );
        }
      };

      return h('div', { className: 'min-h-screen bg-gradient-to-br from-gray-950 to-slate-900 text-gray-100 p-4 md:p-8' },
        h('div', { className: 'max-w-4xl mx-auto' },
          /* Header */
          h('div', { className: 'text-center mb-6' },
            h('div', { className: 'inline-flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-2 rounded-full text-xs font-bold mb-3 tracking-wide' },
              h(Cpu, { className: 'w-3.5 h-3.5' }), 'AD BREAK IDENTIFIER — TECHNICAL ARCHITECTURE v2'
            ),
            h('h1', { className: 'text-2xl md:text-3xl font-extrabold mb-2' }, 'Detection Pipeline Architecture'),
            h('p', { className: 'text-gray-400 text-sm max-w-2xl mx-auto' },
              'Five-stage pipeline: CSV metadata extraction → FFmpeg clip extraction → 1 FPS VLM detection with ensemble voting → 25 FPS frame refinement → lossless advert clip extraction.'
            )
          ),

          /* Tabs */
          h('div', { className: 'flex gap-1 mb-4 bg-gray-900 rounded-xl p-1 overflow-x-auto' },
            TABS.map(tab =>
              h('button', {
                key: tab.id,
                onClick: () => setActiveTab(tab.id),
                className: `tab-btn flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition-all ${
                  activeTab === tab.id
                    ? 'bg-blue-600 text-white shadow-lg'
                    : 'text-gray-400 hover:text-gray-200 hover:bg-gray-800'
                }`
              },
                h(tab.icon, { className: 'w-3.5 h-3.5' }),
                tab.label
              )
            )
          ),

          /* Tab Content */
          renderTab(activeTab)
        )
      );
    }

    function CommandCard({ name, desc, args, color, tag }) {
      return h('div', { className: `bg-gray-800 rounded-xl p-3 border-l-2 ${color} card-hover` },
        h('div', { className: 'flex items-center gap-2 mb-1' },
          h('code', { className: 'mono text-xs font-bold text-gray-100' }, name),
          tag && h(Tag, { color: 'new' }, tag)
        ),
        h('p', { className: 'text-xs text-gray-400 mb-2' }, desc),
        h('div', { className: 'flex flex-wrap gap-1' },
          args.map((a, i) =>
            h('span', { key: i, className: 'mono bg-gray-700 text-gray-300 text-xs px-1.5 py-0.5 rounded' }, a)
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
