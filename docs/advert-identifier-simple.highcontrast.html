<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Break Identifier — How It Works</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@0.454.0/dist/umd/lucide-react.min.js"></script>
  <style>
    body {
      font-family: 'Courier New', 'Courier', monospace;
      background: #000000;
      color: #ffffff;
    }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { outline: 1px solid rgba(255,255,255,0.25); }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createElement: h } = React;
    const { ArrowDown, Sparkles, FileSpreadsheet, Scissors, Eye, Users, Search, Zap, FolderOpen, Film, GitMerge } = LucideReact;

    /* ── colour palette ── */
    const C = {
      bg: '#000',
      card: '#0a0a0a',
      border: '#1a1a1a',
      text: '#fff',
      dim:  '#777',       /* secondary text */
      muted:'#444',       /* tertiary / subtle */
      yellow:'#FFE600',   ydim: '#332600',
      red:   '#FF3333',   rdim: '#330000',
      blue:  '#3399FF',   bdim: '#001a33',
      purple:'#AA66FF',   pdim: '#1a0033',
      green: '#00FF66',   gdim: '#003311',
      pink:  '#FF66B2',   pkdim:'#330022',
    };

    /* shortcut: style({c:C.green}) => {color:C.green} */
    const clr = c => ({ color: c });
    const bg = c => ({ background: c });

    function useInView(ref) {
      const [v, s] = useState(false);
      useEffect(() => {
        if (!ref.current) return;
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) { s(true); o.disconnect(); } }, { threshold: 0.15 });
        o.observe(ref.current);
        return () => o.disconnect();
      }, [ref]);
      return v;
    }

    function StepCard({ icon: Icon, title, children, i, tag, color }) {
      const ref = useRef(null);
      const iv = useInView(ref);
      return h('div', { ref, className: `transition-all duration-500 ease-out ${iv ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}` },
        h('div', {
          className: 'rounded-xl p-6 card-hover',
          style: { transitionDelay: `${i * 100}ms`, background: C.card, borderLeft: `3px solid ${color||C.blue}`,
                   borderTop:'1px solid '+C.border, borderRight:'1px solid '+C.border, borderBottom:'1px solid '+C.border }
        },
          h('div', { className: 'flex items-center gap-3 mb-4' },
            h('div', { className: 'w-10 h-10 rounded flex items-center justify-center shrink-0', style: bg(color||C.blue) },
              h(Icon, { className: 'w-5 h-5', style: { color: C.bg } })
            ),
            h('div', { className: 'flex-1' },
              h('div', { className: 'flex items-center gap-2' },
                h('p', { className: 'text-xs font-bold', style: { color: C.muted, textTransform:'uppercase', letterSpacing:'0.05em' } }, `Step ${i+1}`),
                tag && h('span', { className: 'text-xs font-bold px-2 py-0.5 rounded',
                  style: { background: tag==='NEW'?C.gdim:C.pkdim, color: tag==='NEW'?C.green:C.pink, border:`1px solid ${tag==='NEW'?C.green+'44':C.pink+'44'}` }
                }, tag)
              ),
              h('h3', { className: 'text-lg font-bold mt-1', style: clr(C.text) }, title)
            )
          ),
          children
        )
      );
    }

    function Arrow() {
      return h('div', { className: 'flex justify-center py-2' }, h(ArrowDown, { className: 'w-6 h-6', style: clr(C.muted) }));
    }

    function App() {
      const [mounted, setMounted] = useState(false);
      useEffect(() => { setMounted(true); }, []);

      return h('div', { className: 'min-h-screen p-4 md:p-8', style: bg(C.bg) },
        h('div', { className: 'max-w-2xl mx-auto' },

          /* ── header ── */
          h('div', { className: `text-center mb-8 transition-all duration-700 ease-out ${mounted?'opacity-100 translate-y-0':'opacity-0 -translate-y-4'}` },
            h('div', { className: 'inline-flex items-center gap-2 px-4 py-2 rounded text-sm font-bold mb-4',
                       style: { background: C.gdim, color: C.green, border: `1px solid ${C.green}44` } },
              h(Sparkles, { className: 'w-4 h-4' }), 'Ad Break Identifier'
            ),
            h('h1', { className: 'text-2xl md:text-4xl font-bold mb-2', style: clr(C.text) }, 'How It Works'),
            h('p', { className: 'text-sm max-w-lg mx-auto', style: clr(C.dim) },
              'AI that watches TV recordings and identifies every individual advert within an ad break \u2014 ',
              'from scheduling data to frame-accurate clip extraction.'
            )
          ),

          /* ── big picture ── */
          h('div', { className: `rounded-xl p-5 mb-6 transition-all duration-700 delay-200 ease-out ${mounted?'opacity-100 translate-y-0':'opacity-0 translate-y-4'}`,
                      style: { background: C.card, border: `1px solid #222`, borderLeft: `3px solid ${C.blue}` } },
            h('p', { className: 'text-sm font-bold mb-2', style: clr(C.blue) }, '\u25b6 The Big Picture'),
            h('p', { className: 'text-sm', style: clr(C.dim) },
              'TV recordings contain ad breaks with multiple adverts back-to-back. This tool already knows ',
              h('em', { style: clr(C.green) }, 'what'), ' adverts should be in each break (from scheduling data), ',
              'uses AI to find ', h('em', { style: clr(C.green) }, 'where'), ' each one ends in the video, ',
              'then refines those boundaries to ', h('strong', { style: clr(C.red) }, 'millisecond precision'), ' ',
              'and extracts each advert as a separate video file.'
            )
          ),

          /* ── pipeline glance ── */
          h('div', { className: `rounded-xl p-5 mb-6 transition-all duration-700 delay-300 ease-out ${mounted?'opacity-100 translate-y-0':'opacity-0 translate-y-4'}`,
                      style: { background: C.card, border: `1px solid ${C.border}` } },
            h('p', { className: 'text-xs font-bold mb-3', style: { color: C.muted, textTransform:'uppercase', letterSpacing:'0.05em' } }, 'The Pipeline at a Glance'),
            h('div', { className: 'flex flex-wrap items-center justify-center gap-1 md:gap-2' },
              ['CSV & Video', 'Clip', '1 FPS AI', '25 FPS Refine', 'Advert Clips'].map((l, i, a) =>
                h('div', { key: l, className: 'flex items-center gap-1 md:gap-2' },
                  h('div', { className: 'text-xs font-bold px-2.5 py-1.5 rounded whitespace-nowrap',
                    style: { background: [C.ydim, C.rdim, C.pdim, C.bdim, C.gdim][i],
                             color: [C.yellow, C.red, C.purple, C.blue, C.green][i],
                             border: `1px solid ${[C.yellow,C.red,C.purple,C.blue,C.green][i]}44` }
                  }, l),
                  i < a.length-1 && h('span', { className: 'text-xs', style: clr(C.muted) }, '\u2192')
                )
              )
            )
          ),

          /* ── STEP 1 ── */
          Arrow(),
          h(StepCard, { icon: FileSpreadsheet, title: 'Read the Schedule', i:0, color: C.yellow },
            h('p', { className: 'text-sm mb-4', style: clr(C.dim) },
              'The BFI National Archive obtains scheduling data as CSV files. These contain what was broadcast and approximately when \u2014 including every advert, its brand, duration, and timecode. The tool reads these files and matches them to the video recording.'
            ),
            h('div', { className: 'rounded-xl p-4', style: { background: C.ydim, border: `1px solid ${C.yellow}22` } },
              h('div', { className: 'flex items-center gap-3 mb-3' },
                h('span', { className: 'text-2xl' }, '\ud83d\udccb'),
                h('div', null,
                  h('p', { className: 'text-sm font-bold', style: clr(C.yellow) }, 'CSV Scheduling Data'),
                  h('p', { className: 'text-xs', style: clr(C.yellow+'99') }, 'e.g. 2024-03-26_BFIExport.csv')
                )
              ),
              h('div', { className: 'rounded-lg p-3 space-y-1', style: { background: C.bg, border: '1px solid #222' } },
                h('p', { style: clr(C.dim) }, '13:52:05 \u2014 ', h('span', { style: clr(C.green) }, 'Tesco'), ' (10s)'),
                h('p', { style: clr(C.dim) }, '13:52:15 \u2014 ', h('span', { style: clr(C.blue) }, 'Sky Mobile'), ' (30s)'),
                h('p', { style: clr(C.dim) }, '13:52:45 \u2014 ', h('span', { style: clr(C.yellow) }, 'Cadbury'), ' (20s)'),
                h('p', { style: clr(C.muted) }, '...and so on')
              ),
              h('p', { className: 'text-xs mt-2', style: clr(C.yellow+'99') },
                'The tool also creates a pipeline state file that tracks every advert through all subsequent stages.'
              )
            )
          ),

          /* ── STEP 2 ── */
          Arrow(),
          h(StepCard, { icon: Scissors, title: 'Cut Out the Ad Breaks', i:1, color: C.red },
            h('p', { className: 'text-sm mb-4', style: clr(C.dim) },
              'Rather than processing an entire hours-long recording, the tool cuts out just the ad break sections using FFmpeg. It knows from the schedule roughly when each ad break starts, so it extracts a short clip with configurable buffer \u2014 typically 60 seconds before and 360 seconds after.'
            ),
            h('div', { className: 'rounded-xl p-4', style: { background: C.rdim, border: `1px solid ${C.red}22` } },
              h('div', { className: 'flex items-end gap-0.5 mb-3' },
                [...Array(20)].map((_, i) => {
                  const is = i >= 6 && i <= 13;
                  return h('div', { key:i, className:'flex-1 flex flex-col items-center gap-0.5' },
                    h('div', { className: 'w-full rounded-sm', style: { height: is?32:20, background: is?C.red:'#333' } })
                  );
                })
              ),
              h('div', { className: 'flex items-center gap-2 text-xs' },
                h('div', { className: 'flex items-center gap-1' },
                  h('div', { className: 'w-3 h-3 rounded-sm', style: bg('#333') }),
                  h('span', { style: clr(C.dim) }, 'Programme')
                ),
                h('div', { className: 'flex items-center gap-1' },
                  h('div', { className: 'w-3 h-3 rounded-sm', style: bg(C.red) }),
                  h('span', { style: clr(C.red) }, 'Ad break')
                )
              )
            )
          ),

          /* ── STEP 3 ── */
          Arrow(),
          h(StepCard, { icon: Eye, title: 'AI "Watches" at 1 FPS', i:2, color: C.purple },
            h('p', { className: 'text-sm mb-4', style: clr(C.dim) },
              'The AI watches each ad break clip at 1 frame per second and identifies the last frame of every expected advert. It already knows from the schedule what brands and durations to look for \u2014 its job is to confirm when each one ends by spotting logos or brand names in the final seconds.'
            ),
            h('div', { className: 'rounded-xl p-4', style: { background: C.pdim, border: `1px solid ${C.purple}22` } },
              h('div', { className: 'space-y-2 mb-3' },
                [{ brand:'Tesco', time:'13:52:15' }, { brand:'Sky Mobile', time:'13:52:45' }, { brand:'Cadbury', time:'13:53:05' }]
                  .map((ad, i) =>
                    h('div', { key:i, className:'flex items-center gap-3 rounded-lg px-3 py-2', style:{background:C.bg, border:'1px solid #222'} },
                      h('div', { className:'w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold', style:{background:C.gdim, color:C.green, border:`1px solid ${C.green}44`} }, '\u2713'),
                      h('div', { className: 'flex-1' },
                        h('p', { className:'text-xs font-bold', style:clr(C.text) }, ad.brand),
                        h('p', { className:'text-xs', style:clr(C.muted) }, 'Last frame at ', ad.time)
                      ),
                      h('span', { className:'text-xs font-bold', style:clr(C.green) }, '\u2713 Found')
                    )
                  )
              ),
              h('div', { className: 'flex items-center gap-2 rounded-lg p-3', style: { background: C.card, border: '1px solid #222' } },
                h(Users, { className: 'w-4 h-4 shrink-0', style: clr(C.green) }),
                h('p', { className: 'text-xs', style: clr(C.dim) },
                  h('strong', { style: clr(C.green) }, 'Ensemble voting: '),
                  'The AI watches ', h('strong', { style: clr(C.yellow) }, '5 times'), ' independently and picks the median result, filtering out any wild outliers.'
                )
              )
            )
          ),

          /* ── STEP 4 ── */
          Arrow(),
          h(StepCard, { icon: Search, title: 'Millisecond Precision (25 FPS)', i:3, tag:'NEW', color: C.blue },
            h('p', { className: 'text-sm mb-4', style: clr(C.dim) },
              'The 1 FPS detection gets you within one second \u2014 but broadcast video runs at 25 frames per second. The refinement stage zooms in: for each advert, it extracts a 3-second clip centred on the expected end time, then analyses it at full 25 FPS to find the precise millisecond when the brand logo disappears.'
            ),
            h('div', { className: 'grid grid-cols-2 gap-3 mb-3' },
              h('div', { className: 'rounded-xl p-3', style: { background: C.bdim, border: `1px solid ${C.blue}22` } },
                h('p', { className: 'text-xs font-bold mb-1', style: clr(C.blue) }, '\ud83c\udfaf How It Works'),
                h('ul', { className: 'text-xs space-y-1 ml-3 list-disc', style: clr(C.dim) },
                  h('li', null, '3-second clip per advert'),
                  h('li', null, 'Analysed at 25 FPS (75 frames)'),
                  h('li', null, '3 ensemble calls for accuracy'),
                  h('li', null, 'Median voting per frame')
                )
              ),
              h('div', { className: 'rounded-xl p-3', style: { background: C.bdim, border: `1px solid ${C.blue}22` } },
                h('p', { className: 'text-xs font-bold mb-1', style: clr(C.blue) }, '\u26a1 Configurable FPS'),
                h('ul', { className: 'text-xs space-y-1 ml-3 list-disc', style: clr(C.dim) },
                  h('li', null, '25 FPS default (PAL)'),
                  h('li', null, '24 FPS for NTSC sources'),
                  h('li', null, 'MAD outlier filter available'),
                  h('li', null, 'HH:MM:SS.mmm output')
                )
              )
            ),
            h('div', { className: 'rounded-xl p-3 space-y-1', style: { background: C.bg, border: '1px solid #222' } },
              h('p', { className: 'text-xs', style: clr(C.muted) },
                'Coarse (1 FPS):  ', h('span', { className: 'font-bold', style: clr(C.yellow) }, '13:52:15')
              ),
              h('p', { className: 'text-xs', style: clr(C.muted) },
                'Refined (25 FPS): ', h('span', { className: 'font-bold', style: clr(C.green) }, '13:52:15.080')
              ),
              h('p', { className: 'text-xs mt-1', style: clr(C.muted) },
                '\u2191 Frame-accurate to \u00b140ms'
              )
            )
          ),

          /* ── STEP 5 ── */
          Arrow(),
          h(StepCard, { icon: Film, title: 'Extract Individual Adverts', i:4, tag:'NEW', color: C.green },
            h('p', { className: 'text-sm mb-4', style: clr(C.dim) },
              'Using the refined frame-accurate timecodes, the tool extracts each advert as its own lossless H.264 video clip. Every clip is named with the advert\'s brand, category, and unique ID \u2014 ready for cataloguing, review, or access.'
            ),
            h('div', { className: 'rounded-xl p-4', style: { background: C.gdim, border: `1px solid ${C.green}22` } },
              h('p', { className: 'text-xs font-bold mb-2', style: clr(C.green) }, 'Sample Output'),
              h('div', { className: 'rounded-lg p-3 space-y-1', style: { background: C.bg, border: '1px solid #222' } },
                h('p', { className: 'text-xs', style: clr(C.dim) }, 'clips/', h('span', { className:'font-bold', style:clr(C.green) }, 'BBHTCPT536010'), '_retail_Tesco.mp4'),
                h('p', { className: 'text-xs', style: clr(C.dim) }, 'clips/', h('span', { className:'font-bold', style:clr(C.green) }, 'SKYMO2394030'), '_telecoms_Sky Mobile.mp4'),
                h('p', { className: 'text-xs', style: clr(C.dim) }, 'clips/', h('span', { className:'font-bold', style:clr(C.green) }, 'CADBURY2030'), '_food_Cadbury.mp4')
              ),
              h('div', { className: 'flex items-center gap-2 mt-2 text-xs', style: clr(C.green) },
                h(Zap, { className: 'w-3 h-3' }),
                h('span', null, 'Lossless extraction \u2014 no re-encoding, no quality loss')
              )
            )
          ),

          /* ── pipeline state ── */
          Arrow(),
          h(StepCard, { icon: GitMerge, title: 'Tracking Every Advert Through the Pipeline', i:5, tag:'LATEST', color: C.pink },
            h('p', { className: 'text-sm mb-4', style: clr(C.dim) },
              'A single "pipeline state file" follows each advert through every stage. It starts empty at Step 1, gets updated at each stage \u2014 from "metadata extracted" through "identified" to "refined" \u2014 and finally contains the complete frame-accurate broadcast timecodes needed for clip extraction.'
            ),
            h('div', { className: 'rounded-xl p-4', style: { background: C.pkdim, border: `1px solid ${C.pink}22` } },
              h('div', { className: 'flex flex-wrap items-center justify-center gap-2 text-xs' },
                ['Extracted', 'Clipped', 'Identified', 'Refined', 'Clipped'].map((s, i, a) =>
                  h('div', { key:s, className:'flex items-center gap-2' },
                    h('span', { className:'px-2.5 py-1 rounded-full font-bold whitespace-nowrap',
                      style: { background: C.pkdim, color: C.pink, border: `1px solid ${C.pink}44` }
                    }, '\u2713 ', s),
                    i < a.length-1 && h('span', { className:'text-xs', style:clr(C.muted) }, '\u2192')
                  )
                )
              ),
              h('p', { className: 'text-xs mt-2 text-center', style: clr(C.pink) },
                'The state file bridges clip-relative timecodes to broadcast-absolute offsets.'
              )
            )
          ),

          /* ── full automation ── */
          h('div', { className: `rounded-xl p-5 mt-6 transition-all duration-700 delay-500 ease-out ${mounted?'opacity-100 translate-y-0':'opacity-0 translate-y-8'}`,
                      style: { background: C.bdim, border: `1px solid ${C.blue}44`, borderLeft: `3px solid ${C.blue}` } },
            h('div', { className: 'flex items-center gap-2 mb-2' },
              h(FolderOpen, { className: 'w-5 h-5', style: clr(C.blue) }),
              h('p', { className: 'font-bold text-sm', style: clr(C.blue) }, 'Full Automation Available')
            ),
            h('p', { className: 'text-sm mb-3', style: clr(C.dim) },
              'Point the tool at an entire folder of recordings and it will process them all automatically \u2014 extracting metadata, cutting clips, running 1 FPS and 25 FPS analysis, and extracting every advert clip. One command does everything.'
            ),
            h('div', { className: 'rounded-xl p-3 text-xs', style: { background: C.bg, border: '1px solid #222', color: C.blue } },
              'advert-identifier-pipeline \\', h('br'),
              '  --input-folder /path/to/videos \\', h('br'),
              '  --csv-folder /path/to/csv/files'
            )
          ),

          /* ── footer ── */
          h('div', { className: `text-center mt-8 mb-4 transition-all duration-700 delay-700 ease-out ${mounted?'opacity-100':'opacity-0'}` },
            h('p', { className: 'text-xs', style: clr(C.muted) },
              'Powered by Qwen3.5 Vision-Language Model \u00b7 FFmpeg \u00b7 vLLM \u00b7 Built at the BFI National Archive'
            ),
            h('p', { className: 'text-xs mt-1', style: clr('#333') },
              'v2 \u2014 Updated for full pipeline: 1 FPS detection \u2192 25 FPS refinement \u2192 individual advert clips'
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
