<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Break Identifier — Technical Architecture (Gruvbox)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@0.454.0/dist/umd/lucide-react.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #504945; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #665c54; border-radius: 3px; }
    .tab-btn { transition: all 0.15s ease; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-1px); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.3s ease forwards; }
    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 0 6px rgba(99,102,241,0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, createElement: h } = React;
    const { 
      Cpu, Layers, Terminal, FileSpreadsheet, Scissors, Eye, 
      Search, ArrowRight, ArrowDown, CheckCircle, FolderOpen,
      Cog, GitMerge, Clock, Tv, Database, Filter, Play,
      Sliders, Shield, Settings, Workflow, FileOutput
    } = LucideReact;

    const TABS = [
      { id: 'overview', label: 'Pipeline', icon: Layers },
      { id: 'metadata', label: 'Stage 1: Metadata', icon: FileSpreadsheet },
      { id: 'clip', label: 'Stage 2: Clip Extraction', icon: Scissors },
      { id: 'detect', label: 'Stage 3: AI Detection', icon: Eye },
      { id: 'refine', label: 'Stage 4: Refinement', icon: Search },
      { id: 'extract', label: 'Stage 5: Advert Clips', icon: FileOutput },
      { id: 'automation', label: 'Automation', icon: FolderOpen },
    ];

    function SectionHeader({ icon: Icon, title, color }) {
      return h('div', { className: `flex items-center gap-2 mb-3 pb-2 border-b ${color}` },
        h(Icon, { className: 'w-4 h-4' }),
        h('h3', { className: 'font-bold text-sm' }, title)
      );
    }

    function PipelineNode({ label, sublabel, color, icon: Icon, border }) {
      return h('div', { className: `rounded-lg ${color} ${border || ''} p-2 text-center min-w-max` },
        Icon && h(Icon, { className: 'w-3.5 h-3.5 mx-auto mb-0.5' }),
        h('p', { className: 'text-xs font-bold' }, label),
        sublabel && h('p', { className: 'text-xs opacity-70 leading-tight' }, sublabel)
      );
    }

    function PipeArrow({ label }) {
      return h('div', { className: 'flex flex-col items-center justify-center px-0.5 shrink-0' },
        h(ArrowRight, { className: 'w-3.5 h-3.5 text-[#928374]' }),
        label && h('span', { className: 'text-xs text-[#928374]' }, label)
      );
    }

    function DownArrow({ label }) {
      return h('div', { className: 'flex flex-col items-center py-1' },
        h(ArrowDown, { className: 'w-4 h-4 text-[#928374]' }),
        label && h('span', { className: 'text-xs text-[#928374]' }, label)
      );
    }

    function ParamRow({ name, value, note }) {
      return h('div', { className: 'flex items-baseline gap-2 py-1.5 border-b border-[#504945]' },
        h('code', { className: 'mono text-xs bg-[#504945] px-1.5 py-0.5 rounded text-[#a89984] shrink-0' }, name),
        h('span', { className: 'text-xs font-semibold text-[#d5c4a1]' }, value),
        note && h('span', { className: 'text-xs text-[#928374] ml-auto' }, note)
      );
    }

    function CodeBlock({ children, language }) {
      return h('pre', { className: `bg-[#282828] rounded-lg p-3 ${language === 'json' ? 'text-xs text-[#bdae93]' : 'mono text-xs text-[#b8bb26]'} overflow-x-auto` },
        children
      );
    }

    function Tag({ children, color }) {
      const colors = {
        new: 'bg-[#504945] text-[#ebdbb2] border border-[#98971a]',
        update: 'bg-[#504945] text-[#ebdbb2] border border-[#d79921]',
        stable: 'bg-[#665c54] text-[#bdae93]',
      };
      return h('span', { className: `${colors[color] || colors.new} text-xs font-bold px-1.5 py-0.5 rounded` }, children);
    }

    function App() {
      const [activeTab, setActiveTab] = useState('overview');

      const renderTab = (tabId) => {
        const ani = { className: 'animate-in' };

        switch(tabId) {
          case 'overview': return h('div', { key: 'overview', ...ani },
            /* Pipeline Overview */
            h('div', { className: 'bg-[#3c3836] border border-[#504945] rounded-2xl p-5 mb-4' },
              h(SectionHeader, { icon: Layers, title: 'End-to-End Pipeline', color: 'border-[#458588] text-[#83a598]' }),
              h('p', { className: 'text-xs text-[#a89984] mb-4' },
                'Five discrete stages, each with its own CLI command. Stages produce artifacts consumed by the next. ',
                h(Tag, { color: 'new' }, 'NEW'), ' Stages 4 and 5 added since initial release.'
              ),

              /* 5-Stage Pipeline Flow */
              h('div', { className: 'space-y-2' },
                /* Stage 1 */
                h('div', { className: 'bg-[#3c3836] border border-[#d79921] rounded-xl p-3 card-hover' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-[#d79921] text-[#fbf1c7] text-xs font-bold px-2 py-0.5 rounded' }, '1'),
                    h('p', { className: 'text-xs font-bold text-[#fabd2f]' }, 'Metadata Extraction'),
                    h('code', { className: 'mono text-xs text-[#d79921] ml-auto' }, 'advert-identifier-metadata-extract')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'Video filename'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'CSV lookup'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'Filter & group'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#d79921] px-2 py-1 rounded text-[#ebdbb2] font-bold' }, '_metadata.json'),
                    h('span', { className: 'text-[#7c6f64] px-1' }, '+'),
                    h('span', { className: 'bg-[#458588] px-2 py-1 rounded text-[#ebdbb2] font-bold' }, '_pipeline_state.json')
                  )
                ),
                h(DownArrow, { label: 'JSON metadata + state file' }),
                /* Stage 2 */
                h('div', { className: 'bg-[#3c3836] border border-[#cc241d] rounded-xl p-3 card-hover' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-[#cc241d] text-[#fbf1c7] text-xs font-bold px-2 py-0.5 rounded' }, '2'),
                    h('p', { className: 'text-xs font-bold text-[#fb4934]' }, 'Clip Extraction'),
                    h('code', { className: 'mono text-xs text-[#cc241d] ml-auto' }, 'advert-identifier-clip')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, '_metadata.json'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'FFmpeg seek'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, '-60s / +360s window'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#cc241d] px-2 py-1 rounded text-[#ebdbb2] font-bold' }, '_CLIP.mp4 per break')
                  )
                ),
                h(DownArrow, { label: 'video clips' }),
                /* Stage 3 */
                h('div', { className: 'bg-[#3c3836] border border-[#b16286] rounded-xl p-3 card-hover' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-[#b16286] text-[#fbf1c7] text-xs font-bold px-2 py-0.5 rounded' }, '3'),
                    h('p', { className: 'text-xs font-bold text-[#d3869b]' }, 'AI Identification', h('span', { className: 'ml-1.5 text-[#928374] font-normal' }, '(1 FPS)')),
                    h('code', { className: 'mono text-xs text-[#b16286] ml-auto' }, 'advert-identifier')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'Clip + metadata'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'VLM analysis'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'Ensemble (5×) + vote'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#b16286] px-2 py-1 rounded text-[#ebdbb2] font-bold' }, '_CLIP.xml + state update')
                  )
                ),
                h(DownArrow, { label: 'XML results + coarse_1fps state' }),
                /* Stage 4 - NEW */
                h('div', { className: 'bg-[#3c3836] border border-[#689d6a] rounded-xl p-3 card-hover ring-1 ring-[#8ec07c]/30' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-[#689d6a] text-[#fbf1c7] text-xs font-bold px-2 py-0.5 rounded' }, '4'),
                    h('p', { className: 'text-xs font-bold text-[#8ec07c]' }, 'Frame Refinement', h('span', { className: 'ml-1.5 text-[#928374] font-normal' }, '(25 FPS)')),
                    h(Tag, { color: 'new' }, 'NEW'),
                    h('code', { className: 'mono text-xs text-[#689d6a] ml-auto' }, 'advert-identifier-refine')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'XML + clip URL'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, '3s clip @ 25 FPS'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'Ensemble (3×) + MAD filter'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#689d6a] px-2 py-1 rounded text-[#ebdbb2] font-bold' }, '_refined.xml + state update')
                  )
                ),
                h(DownArrow, { label: 'Refined XML + adjusted_start_broadcast' }),
                /* Stage 5 - NEW */
                h('div', { className: 'bg-[#3c3836] border border-[#98971a] rounded-xl p-3 card-hover ring-1 ring-[#b8bb26]/30' },
                  h('div', { className: 'flex items-center gap-2 mb-2' },
                    h('span', { className: 'bg-[#98971a] text-[#fbf1c7] text-xs font-bold px-2 py-0.5 rounded' }, '5'),
                    h('p', { className: 'text-xs font-bold text-[#b8bb26]' }, 'Advert Clip Extraction'),
                    h(Tag, { color: 'new' }, 'NEW'),
                    h('code', { className: 'mono text-xs text-[#98971a] ml-auto' }, 'advert-identifier-single-advert-clip')
                  ),
                  h('div', { className: 'flex items-center gap-1 overflow-x-auto text-xs' },
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'Refined XML'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'State file seek offset'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#504945] px-2 py-1 rounded text-[#bdae93]' }, 'FFmpeg lossless cut'),
                    h(PipeArrow),
                    h('span', { className: 'bg-[#98971a] px-2 py-1 rounded text-[#ebdbb2] font-bold' }, 'Individual .mp4 per advert')
                  )
                )
              ),

              /* File naming */
              h('div', { className: 'mt-4 bg-[#504945] rounded-xl p-3' },
                h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'File Naming Convention'),
                h('div', { className: 'space-y-1 mono text-xs' },
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-[#a89984]' }, 'Video:'), h('span', { className: 'text-[#83a598]' }, 'YYYY-MM-DD_CHANNEL_HH:MM:SS.mp4')),
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-[#a89984]' }, 'CSV:'), h('span', { className: 'text-[#fabd2f]' }, 'YYYY-MM-DD_BFIExport.csv')),
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-[#a89984]' }, 'State:'), h('span', { className: 'text-[#83a598]' }, '{video}_pipeline_state.json')),
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-[#a89984]' }, 'Clip:'), h('span', { className: 'text-[#fb4934]' }, '{video}_{index}of{total}_CLIP.mp4')),
                  h('div', { className: 'flex items-baseline gap-2' }, h('span', { className: 'text-[#a89984]' }, 'Advert:'), h('span', { className: 'text-[#b8bb26]' }, '{unique_id}_{category}_{brand}.mp4'))
                )
              )
            ),

            /* CLI commands card */
            h('div', { className: 'bg-[#3c3836] border border-[#504945] rounded-2xl p-5' },
              h(SectionHeader, { icon: Terminal, title: 'CLI Commands', color: 'border-[#665c54] text-[#bdae93]' }),
              h('div', { className: 'space-y-2' },
                h(CommandCard, { name: 'advert-identifier', desc: 'Core 1 FPS detection with ensemble voting', args: ['--mode timecode|frame', '--ad-break-index N', '--no-ensemble', '--no-thinking', '--verbose', '--debug', '--model NAME'], color: 'border-[#d3869b]' }),
                h(CommandCard, { name: 'advert-identifier-refine', desc: '25 FPS frame-accurate boundary refinement', args: ['--xml-file', '--video-url', '--json-file', '--refine-fps 25', '--ensemble-filter mad', '--no-thinking'], color: 'border-[#8ec07c]', tag: 'NEW' }),
                h(CommandCard, { name: 'advert-identifier-pipeline', desc: 'Full automation: processes entire folders end-to-end', args: ['--input-folder', '--csv-folder', '--video-server-url', '--dry-run', '--log-level'], color: 'border-blue-500' }),
                h(CommandCard, { name: 'advert-identifier-metadata-extract', desc: 'Parses video filenames → matches CSV → produces metadata + state JSON', args: ['--video', '--csv-folder', '--output-dir', '--before-secs'], color: 'border-[#fabd2f]' }),
                h(CommandCard, { name: 'advert-identifier-clip', desc: 'FFmpeg clip extraction centered on ad break timestamps', args: ['--json-file', '--before-secs 60', '--after-secs 360', '--overlay-type'], color: 'border-[#fb4934]' }),
                h(CommandCard, { name: 'advert-identifier-single-advert-clip', desc: 'Lossless individual advert clip extraction', args: ['--xml-file', '--video-url', '--state-file', '--output-dir', '--trim', '--pad'], color: 'border-[#b8bb26]', tag: 'NEW' }),
                h(CommandCard, { name: 'advert-identifier-benchmark', desc: 'Accuracy testing against ground truth', args: ['--ground-truth-first', '-n 10'], color: 'border-gray-500' }),
              )
            )
          );

          case 'metadata': return h('div', { key: 'metadata', ...ani },
            h('div', { className: 'bg-[#3c3836] border border-[#504945] rounded-2xl p-5' },
              h(SectionHeader, { icon: FileSpreadsheet, title: 'Stage 1 — Metadata Extraction', color: 'border-[#d79921] text-[#fabd2f]' }),
              h('p', { className: 'text-xs text-[#a89984] mb-4' },
                'Parses the video filename to extract date and channel, locates the corresponding CSV scheduling file, and filters it to the relevant broadcast window. Outputs structured JSON with ad break timestamps plus a ',
                h('code', { className: 'mono bg-[#504945] px-1 rounded text-xs' }, '_pipeline_state.json'),
                ' for advert tracking across all stages.'
              ),
              h('div', { className: 'bg-[#504945] rounded-xl p-4 mb-3' },
                h('p', { className: 'text-xs font-bold text-[#fabd2f] mb-2' }, 'Processing Flow'),
                h('div', { className: 'flex items-center gap-1 overflow-x-auto pb-1' },
                  h(PipelineNode, { label: 'Video filename', sublabel: 'date + channel + time', color: 'bg-[#665c54] text-[#bdae93]', icon: Tv }),
                  h(PipeArrow),
                  h(PipelineNode, { label: 'Locate CSV', sublabel: 'YYYY-MM-DD_BFIExport.csv', color: 'bg-[#665c54] text-[#bdae93]', icon: Search }),
                  h(PipeArrow),
                  h(PipelineNode, { label: 'Filter by channel', sublabel: '+ time window', color: 'bg-[#504945] text-[#ebdbb2]', border: 'border border-[#d79921]', icon: Filter }),
                  h(PipeArrow),
                  h(PipelineNode, { label: 'Group ad breaks', sublabel: 'consecutive ads', color: 'bg-[#504945] text-[#ebdbb2]', icon: Database }),
                  h(PipeArrow),
                  h(PipelineNode, { label: '_metadata.json', color: 'bg-[#d79921] text-[#fbf1c7]', icon: CheckCircle }),
                  h('span', { className: 'text-[#7c6f64] px-1 text-xs' }, '+'),
                  h(PipelineNode, { label: '_pipeline_state.json', sublabel: 'per-advert tracking', color: 'bg-[#458588] text-[#fbf1c7]', icon: GitMerge })
                )
              ),
              h('div', { className: 'bg-[#504945] rounded-xl p-3 mb-3' },
                h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'Pipeline State File ', h(Tag, { color: 'update' }, 'UPDATED')),
                h('p', { className: 'text-xs text-[#a89984] mb-2' },
                  'The state file is ', h('strong', { className: 'text-[#d5c4a1]' }, 'the system of record'), ' for advert progression through all stages. ',
                  'Created here, updated by each subsequent stage.'
                ),
                h('div', { className: 'flex items-center gap-2 text-xs text-[#a89984] mb-2' },
                  h(ArrowRight, { className: 'w-3 h-3' }),
                  h('span', null, 'State machine: '),
                  ['Extracted', 'Clipped', 'Identified', 'Refined', 'Clipped'].map((s, i, arr) =>
                    h('span', { key: s, className: 'flex items-center gap-1' },
                      h('span', { className: 'text-[#928374]' }, s),
                      i < arr.length - 1 && h('span', { className: 'text-[#7c6f64]' }, '→')
                    )
                  )
                )
              ),
              h('div', { className: 'bg-[#504945] rounded-xl p-3 mb-3' },
                h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'Output Structure (per ad break)'),
                h(CodeBlock, { language: 'json' },
`{
  "ad_breaks": [{
    "index": 0,
    "programme_before": {"title": "ITV LUNCHTIME NEWS"},
    "programme_after": {"title": "ITV LUNCHTIME NEWS"},
    "start_time": "13:52:05",
    "end_time": "13:55:35",
    "adverts": [{
      "unique_id": "BBHTCPT536010",
      "advertiser": "Tesco stores",
      "brand": "Tesco easter",
      "category": "Food & drink",
      "duration_seconds": 10,
      "start_time": "13:52:05",
      "position_in_break": "First"
    }]
  }],
  "summary": {
    "total_ad_breaks": 1,
    "total_adverts": 7
  }
}`
                )
              ),
              h('div', { className: 'bg-[#504945] rounded-xl p-3' },
                h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'Key Parameters'),
                h(ParamRow, { name: '--video', value: 'path/to/video.mp4', note: 'filename parsed for date/channel' }),
                h(ParamRow, { name: '--csv-folder', value: 'path/to/csv/', note: 'defaults to video directory' }),
                h(ParamRow, { name: '--output-dir', value: 'path/to/output/', note: 'where JSON + state files are written' }),
                h(ParamRow, { name: '--before-secs', value: '10.0', note: 'affects clip_offset in pipeline state' })
              )
            )
          );

          case 'clip': return h('div', { key: 'clip', ...ani },
            h('div', { className: 'bg-[#3c3836] border border-[#504945] rounded-2xl p-5' },
              h(SectionHeader, { icon: Scissors, title: 'Stage 2 — Clip Extraction', color: 'border-[#cc241d] text-[#fb4934]' }),
              h('p', { className: 'text-xs text-[#a89984] mb-4' },
                'Reads the metadata JSON, iterates over each ad break, and uses FFmpeg to extract a clip centered on the ad break\'s start timecode. The extraction window is configurable. Supports optional burnt-in timecode or frame overlays.'
              ),
              h('div', { className: 'bg-[#504945] rounded-xl p-4 mb-3' },
                h('p', { className: 'text-xs font-bold text-[#fb4934] mb-2' }, 'Extraction Window'),
                h('div', { className: 'relative bg-[#665c54] rounded-lg p-4' },
                  h('div', { className: 'flex items-end gap-px h-16' },
                    [...Array(30)].map((_, i) => {
                      const isBefore = i >= 3 && i < 6;
                      const isAdBreak = i >= 6 && i <= 24;
                      const isAfter = i > 24 && i <= 27;
                      let bg = 'bg-gray-600', hgt = 'h-6';
                      if (isAdBreak) { bg = 'bg-[#504945]0'; hgt = 'h-12'; }
                      else if (isBefore || isAfter) { bg = 'bg-rose-300'; hgt = 'h-8'; }
                      return h('div', { key: i, className: `flex-1 ${bg} ${hgt} rounded-sm` });
                    })
                  ),
                  h('div', { className: 'flex items-center gap-2 mt-2 text-xs' },
                    h('div', { className: 'flex items-center gap-1' }, h('div', { className: 'w-2.5 h-2.5 bg-gray-600 rounded-sm' }), h('span', { className: 'text-[#a89984]' }, 'Programme')),
                    h('div', { className: 'flex items-center gap-1' }, h('div', { className: 'w-2.5 h-2.5 bg-rose-300 rounded-sm' }), h('span', { className: 'text-[#fb4934]' }, 'Buffer')),
                    h('div', { className: 'flex items-center gap-1' }, h('div', { className: 'w-2.5 h-2.5 bg-[#504945]0 rounded-sm' }), h('span', { className: 'text-[#fb4934]' }, 'Ad break'))
                  )
                )
              ),
              h('div', { className: 'bg-[#504945] rounded-xl p-4 mb-3' },
                h('p', { className: 'text-xs font-bold text-[#fb4934] mb-2' }, 'FFmpeg Command'),
                h(CodeBlock, {},
`ffmpeg -ss <start - before_secs> \\
  -i source_video.mp4 \\

              h('div', { className: 'bg-[#504945] rounded-xl p-3 mb-3' },
                h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'Example'),
                h(CodeBlock, {},
`advert-identifier-pipeline \\
  --input-folder /path/to/videos \\
  --csv-folder /path/to/csv/files \\
  --before-secs 60 \\
  --after-secs 360 \\
  --video-server-url http://your-server:1100`
                )
              ),
              /* Pipeline state detail */
              h('div', { className: 'bg-[#504945] rounded-xl p-3 mb-3' },
                h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'Pipeline State File (System of Record) ', h(Tag, { color: 'update' }, 'UPDATED')),
                h(CodeBlock, { language: 'json' },
`{
  "pipeline_version": 1,
  "video_info": {
    "filepath": "video/2024-03-26_ITV1HD_13:30:00.mp4",
    "start_time": "13:30:00"
  },
  "ad_breaks": [{
    "index": 1,
    "start_time": "13:52:05",
    "clip_offset": 1295.0,
    "adverts": [{
      "unique_id": "BBHTCPT536010",
      "brand": "Tesco",
      "status": "refined",
      "coarse_1fps": {
        "last_timecode": "22:05",
        "last_seconds_clip": 1325.0
      },
      "refined_25fps": {
        "last_timecode": "00:22:05.080",
        "last_seconds_clip": 1325.08,
        "clip_frame": 42,
        "last_seconds_broadcast": 2620.08,
        "adjusted_start_broadcast": 2610.08
      }
    }]
  }]
}`
                ),
                h('p', { className: 'text-xs text-[#928374] mt-2' },
                  h('strong', { className: 'text-[#bdae93]' }, 'adusted_start_broadcast'), ' is the final FFmpeg seek offset for clip extraction. ',
                  'Computed as: ', h('code', { className: 'mono bg-[#665c54] px-1 rounded text-[#a89984]' }, 'last_seconds_broadcast - scheduled_duration_seconds')
                )
              ),
              /* Coordinate systems */
              h('div', { className: 'bg-[#504945] rounded-xl p-3' },
                h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'Coordinate Systems'),
                h('p', { className: 'text-xs text-[#a89984] mb-2' }, 'The pipeline operates in three coordinate frames:'),
                h('div', { className: 'overflow-x-auto' },
                  h('table', { className: 'w-full text-xs text-left' },
                    h('thead', null,
                      h('tr', { className: 'border-b border-[#665c54]' },
                        h('th', { className: 'py-1 text-[#a89984] font-semibold pr-3' }, 'Frame'),
                        h('th', { className: 'py-1 text-[#a89984] font-semibold pr-3' }, 'Origin'),
                        h('th', { className: 'py-1 text-[#a89984] font-semibold' }, 'Used by'))
                    ),
                    h('tbody', { className: 'text-[#bdae93]' },
                      [['Broadcast-absolute', 'Start of full broadcast .mp4', 'FFmpeg -ss seeks'],
                       ['Clip-relative', 'Start of 6-minute extracted clip', '1 FPS LLM, 25 FPS refinement'],
                       ['Time-of-day', 'Wall clock HH:MM:SS', 'CSV metadata'],
                      ].map(([a, b, c], i) =>
                        h('tr', { key: i, className: 'border-b border-[#504945]' },
                          h('td', { className: 'py-1 text-[#a89984] font-semibold pr-3' }, a),
                          h('td', { className: 'py-1 text-[#bdae93] pr-3' }, b),
                          h('td', { className: 'py-1 text-[#a89984]' }, c))
                      ))
                  )
                ),
                h('p', { className: 'text-xs text-[#928374] mt-2' },
                  'Bridged by ', h('code', { className: 'mono bg-[#665c54] px-1 rounded' }, 'clip_offset = (break_start_tod - video_start_tod) - before_secs'),
                  '. See ', h('a', { href: '../docs/coordinate-systems.md', className: 'text-[#83a598] hover:underline' }, 'docs/coordinate-systems.md'),
                  '.'
                )
              )
            ),
            /* Requirements */
            h('div', { className: 'bg-[#3c3836] border border-[#504945] rounded-2xl p-5 mt-4' },
              h(SectionHeader, { icon: Settings, title: 'Requirements', color: 'border-[#665c54] text-[#bdae93]' }),
              h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-3' },
                h('div', { className: 'bg-[#504945] rounded-xl p-3' },
                  h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'Runtime'),
                  h(ParamRow, { name: 'Python', value: '3.10+' }),
                  h(ParamRow, { name: 'FFmpeg', value: 'installed in PATH' }),
                  h(ParamRow, { name: 'vLLM', value: 'server with VLM loaded' }),
                  h(ParamRow, { name: 'Model', value: 'Qwen3.5-4B recommended' })
                ),
                h('div', { className: 'bg-[#504945] rounded-xl p-3' },
                  h('p', { className: 'text-xs font-bold text-[#bdae93] mb-2' }, 'Model Options'),
                  h('div', { className: 'space-y-1.5' },
                    h('div', { className: 'flex items-center gap-2' }, h('span', { className: 'text-xs font-bold text-[#83a598]' }, 'Qwen3.5-4B'), h('span', { className: 'text-xs text-[#928374]' }, '— 60s video, ~70% VRAM, fast')),
                    h('div', { className: 'flex items-center gap-2' }, h('span', { className: 'text-xs font-bold text-purple-400' }, 'Qwen3.5-9B'), h('span', { className: 'text-xs text-[#928374]' }, '— medium video, ~90% VRAM')),
                    h('div', { className: 'flex items-center gap-2' }, h('span', { className: 'text-xs font-bold text-[#fabd2f]' }, 'Qwen3.5-27B-FP8'), h('span', { className: 'text-xs text-[#928374]' }, '— text-only, ~50% VRAM, very fast'))
                  )
                )
              )
            ),
            /* Footer */
            h('p', { className: 'text-center text-xs text-[#7c6f64] mt-6 mb-4' },
              'Qwen3.5 · FFmpeg · vLLM Serve API · Built at BFI National Archive',
              h('br'),
              h('span', { className: 'text-[#665c54]' }, 'v2 — Updated with Stages 4 & 5: 25 FPS refinement + advert clip extraction')
            )
          );
        }
      };

      return h('div', { className: 'min-h-screen bg-[#282828] text-[#ebdbb2] p-4 md:p-8' },
        h('div', { className: 'max-w-4xl mx-auto' },
          /* Header */
          h('div', { className: 'text-center mb-6' },
            h('div', { className: 'inline-flex items-center gap-2 bg-[#458588] text-[#fbf1c7] px-4 py-2 rounded-full text-xs font-bold mb-3 tracking-wide' },
              h(Cpu, { className: 'w-3.5 h-3.5' }), 'AD BREAK IDENTIFIER — TECHNICAL ARCHITECTURE v2'
            ),
            h('h1', { className: 'text-2xl md:text-3xl font-extrabold mb-2' }, 'Detection Pipeline Architecture'),
            h('p', { className: 'text-[#a89984] text-sm max-w-2xl mx-auto' },
              'Five-stage pipeline: CSV metadata extraction → FFmpeg clip extraction → 1 FPS VLM detection with ensemble voting → 25 FPS frame refinement → lossless advert clip extraction.'
            )
          ),

          /* Tabs */
          h('div', { className: 'flex gap-1 mb-4 bg-[#3c3836] rounded-xl p-1 overflow-x-auto' },
            TABS.map(tab =>
              h('button', {
                key: tab.id,
                onClick: () => setActiveTab(tab.id),
                className: `tab-btn flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition-all ${
                  activeTab === tab.id
                    ? 'bg-[#458588] text-[#fbf1c7] shadow-lg'
                    : 'text-[#a89984] hover:text-[#d5c4a1] hover:bg-[#504945]'
                }`
              },
                h(tab.icon, { className: 'w-3.5 h-3.5' }),
                tab.label
              )
            )
          ),

          /* Tab Content */
          renderTab(activeTab)
        )
      );
    }

    function CommandCard({ name, desc, args, color, tag }) {
      return h('div', { className: `bg-[#504945] rounded-xl p-3 border-l-2 ${color} card-hover` },
        h('div', { className: 'flex items-center gap-2 mb-1' },
          h('code', { className: 'mono text-xs font-bold text-[#ebdbb2]' }, name),
          tag && h(Tag, { color: 'new' }, tag)
        ),
        h('p', { className: 'text-xs text-[#a89984] mb-2' }, desc),
        h('div', { className: 'flex flex-wrap gap-1' },
          args.map((a, i) =>
            h('span', { key: i, className: 'mono bg-[#665c54] text-[#bdae93] text-xs px-1.5 py-0.5 rounded' }, a)
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
